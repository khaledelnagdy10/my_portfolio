    <style>
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: #00d4ff;
            text-decoration: none;
            padding: 16px 28px;
            background: rgba(10,14,39,0.9);
            border: 2px solid #00d4ff;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.4s ease;
            font-size: 16px;
            box-shadow: 0 10px 40px rgba(0,212,255,0.3);
        }

        .back-link:hover {
            background: #00d4ff;
            color: #0a0e27;
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,212,255,0.5);
        }

        .gallery-header {
            text-align: center;
            padding: 140px 40px 80px;
            max-width: 800px;
            margin: 0 auto;
        }

        .gallery-header h1 {
            font-size: clamp(36px, 8vw, 64px);
            background: linear-gradient(45deg, #00d4ff, #6c63ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .gallery-header p {
            font-size: clamp(18px, 4vw, 24px);
            color: rgba(255,255,255,0.8);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 32px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px 120px;
        }

        .product-image {
            width: 100%;
            height: auto;
            aspect-ratio: 4/3;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: block;
        }

        .product-image:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 50px 120px rgba(0,212,255,0.5);
            border-color: #00d4ff;
        }

        @media (max-width: 1200px) {
            .products-grid {
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 28px;
                padding: 0 32px 100px;
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 24px;
                padding: 0 24px 80px;
                margin-top: 80px;
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.08);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#00d4ff, #6c63ff);
            border-radius: 10px;
            border: 3px solid rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(#6c63ff, #00d4ff);
        }
